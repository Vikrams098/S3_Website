name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

# One deployment at a time — never cancel an in-flight deploy
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  Deploy:
    uses: ./.github/workflows/docker-image-deploy.yml
    with:
      image_name:     kvs-cafe
      container_name: kvs-cafe-app
    secrets: inherit
