name: Docker image deploy

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

# One deployment at a time — never cancel an in-flight deploy
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  Deploy:
    uses: Vikrams098/Dependencies/.github/workflows/docker_image_deploy.yml@main
    with:
      image_name:     kvs-cafe
      container_name: kvs-cafe-app
    secrets:
      DOCKERHUB_USERNAME:      ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN:         ${{ secrets.DOCKERHUB_TOKEN }}
      EC2_INSTANCE_ID:         ${{ secrets.KV_EC2_INSTANCE_ID }}
      S3_DEPLOY_ACCESS_KEY:    ${{ secrets.S3_DEPLOY_ACCESS_KEY }}
      S3_DEPLOY_SECRET_KEY:    ${{ secrets.S3_DEPLOY_SECRET_KEY }}
      AWS_REGION:              ${{ secrets.AWS_REGION }}
      S3_DEPLOY_BUCKET_NAME:   ${{ secrets.S3_DEPLOY_BUCKET_NAME }}
